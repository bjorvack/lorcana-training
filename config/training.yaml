# Pinned upstream artifacts and core training hyperparameters.
#
# Every cross-repo dependency is pinned here by exact tag. Bump via a
# reviewed PR; the `ModelManifest` emitted by `export` records all
# three tags so published models can always be retraced to the data
# and schemas they were trained against.

# github.com/bjorvack/lorcana-schemas — JSON Schemas for pydantic codegen
schemas_repo:          bjorvack/lorcana-schemas
schemas_release_tag:   v0.5.0

# github.com/bjorvack/lorcana-scraper — cards-vN (CardSet) + tournaments-vN (Dataset)
scraper_repo:          bjorvack/lorcana-scraper
cards_release_tag:     cards-v2026.05.14-02
tournaments_release_tag: tournaments-v0.6.0

# `encoder_release_tag` is unset until the first successful pretrain run; the
# proposal and evaluator stages require it.
# encoder_release_tag: encoder-vYYYY.MM.DD-NN

encoder:
  embedding_dim: 256
  text_encoder: minilm

proposal:
  hidden_dim: 256
  num_heads: 8
  num_layers: 4
  entropy_coef: 0.01

evaluator:
  hidden_dim: 256

training:
  batch_size: 64
  learning_rate: 3.0e-4
  max_epochs: 50
