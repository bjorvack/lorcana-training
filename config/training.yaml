# Pinned upstream artifacts and core training hyperparameters.
# TODO: finalise once the first encoder/proposal/evaluator train end-to-end.

cards_release_tag: latest
tournaments_release_tag: latest

encoder:
  embedding_dim: 256
  text_encoder: minilm

proposal:
  hidden_dim: 256
  num_heads: 8
  num_layers: 4
  entropy_coef: 0.01

evaluator:
  hidden_dim: 256

training:
  batch_size: 64
  learning_rate: 3.0e-4
  max_epochs: 50
